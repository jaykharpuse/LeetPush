<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetPush Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #282828;
      --surface-hover: #333333;
      --accent: #FFA116;
      --accent-hover: #e08e12;
      --text: #eff1f6;
      --text-secondary: #8c8c8c;
      --success: #00b8a3;
      --error: #ff375f;
      --border: #383838;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      width: 320px;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: rgba(255, 161, 22, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 18px;
      height: 18px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: var(--accent);
    }

    /* Status Indicator */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 8px;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--error);
      box-shadow: 0 0 8px var(--error);
      transition: all 0.3s ease;
    }

    .status-dot.connected {
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    /* Info card */
    .info-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: background-color 0.2s ease;
    }

    .info-card:hover {
      background-color: var(--surface-hover);
    }

    .info-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .info-value {
      font-size: 14px;
      font-weight: 500;
      word-break: break-all;
    }

    .info-value a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .info-value a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .last-push-detail {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Action buttons */
    .btn-action {
      background: linear-gradient(135deg, var(--accent), #FF8A00);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      text-align: center;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-action:hover {
      box-shadow: 0 4px 12px rgba(255, 161, 22, 0.3);
      transform: translateY(-1px);
    }

    .btn-action:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="brand">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
            <defs>
              <linearGradient id="grad-logo" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FFA116;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#FF8A00;stop-opacity:1" />
              </linearGradient>
            </defs>
            <path d="M 64,95 L 64,45 M 64,45 L 48,61 M 64,45 L 80,61" stroke="url(#grad-logo)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="64" cy="95" r="10" fill="#eff1f6" />
            <circle cx="64" cy="35" r="10" fill="#00b8a3" />
          </svg>
        </div>
        <h1>Leet<span>Push</span></h1>
      </div>
      <div class="status-badge" title="GitHub Connection Status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
    </header>

    <div class="info-card">
      <div class="info-section">
        <span class="info-label">GitHub Repository</span>
        <span class="info-value" id="repoValue">Not configured</span>
      </div>

      <div class="info-section" id="lastPushSection" style="display: none;">
        <span class="info-label">Last Pushed Solution</span>
        <span class="info-value" id="lastPushName">Two Sum</span>
        <span class="last-push-detail" id="lastPushTime">5 minutes ago</span>
      </div>
    </div>

    <button class="btn-action" id="settingsBtn">
      <!-- Settings icon -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      Open Settings
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
